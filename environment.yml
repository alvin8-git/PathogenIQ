# Conda environment for PathogenIQ.
#   mamba env create -f environment.yml   (or: conda env create -f environment.yml)
#   conda activate pathogeniq
# Pins the external bioinformatics tools the pipeline shells out to, the Python
# runtime deps (mirrors pyproject.toml), and the benchmark tools (T10).
name: pathogeniq
channels:
  - conda-forge
  - bioconda
dependencies:
  - python>=3.11
  # --- pipeline tools (must be on PATH) ---
  - fastp          # short-read QC
  - chopper        # long-read QC
  - bwa-mem2       # short-read host removal
  - minimap2       # long-read host removal + targeted alignment
  - samtools
  - sourmash>=4.8  # sketch screening
  - abricate       # AMR detection
  # --- benchmark tools (T10: Kraken2 baseline) ---
  - kraken2
  - bracken
  # --- optional: de novo assembly + MAG arm (--assemble); CheckM/GTDB-Tk each
  #     need their own reference DB. Stage skips gracefully if absent. ---
  - megahit        # assembly
  - metabat2       # binning (+ jgi_summarize_bam_contig_depths)
  - checkm-genome  # MAG completeness/contamination QC
  - gtdbtk         # MAG genome taxonomy
  # --- optional: open-world novelty trigger (--novelty); needs a broad Kraken2
  #     DB ($KRAKEN2_DB or databases/kraken2 Standard build). Skips if absent. ---
  #     kraken2 is already pinned above (benchmark tools).
  #
  # NOTE: the viral arm (--viral) tools geNomad + CheckV require numpy<2 and
  # CONFLICT with this env's numpy-2.x stack (scipy/pandas). Install them in a
  # SEPARATE env and symlink the CLIs in (they are external binaries, like
  # abricate). See scripts/13_setup_viral_env.sh:
  #     mamba create -n genomad -c conda-forge -c bioconda genomad checkv
  #     conda run -n genomad genomad download-database databases   # -> databases/genomad_db
  #     conda run -n genomad checkv  download_database databases    # -> databases/checkv_db
  #     ln -sfn $CONDA/envs/genomad/bin/{genomad,checkv} $CONDA/envs/pathogeniq/bin/
  # --- Python runtime deps (mirror pyproject.toml) ---
  - click>=8.1
  - numpy>=1.26
  - scipy>=1.12
  - pysam>=0.22
  - pandas>=2.2
  - reportlab>=4.0
  # --- dev ---
  - pytest>=8.0
  - pytest-cov>=5.0
  - ruff
  - mypy
  - pip
  - pip:
      - -e .
